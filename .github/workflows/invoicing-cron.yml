name: Facturation — cron quotidien

on:
  schedule:
    - cron: "0 7 * * *" # tous les jours à 07h00 UTC (≈ 09h Paris)
  workflow_dispatch: {} # déclenchable manuellement

jobs:
  run-crons:
    runs-on: ubuntu-latest
    steps:
      - name: Génération factures coworking dues
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://admin.casaminga.com/api/cron/coworking-invoices" \
            -w "\nHTTP %{http_code}\n"

      - name: Relances de paiement (factures en retard)
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://admin.casaminga.com/api/cron/payment-reminders" \
            -w "\nHTTP %{http_code}\n"

      - name: Rappels J-1 réservations + J-30 adhésions
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://admin.casaminga.com/api/cron/reminders" \
            -w "\nHTTP %{http_code}\n"

      - name: Newsletters automatiques (récurrent + sur_evenement + programmées)
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://admin.casaminga.com/api/cron/newsletters" \
            -w "\nHTTP %{http_code}\n"
