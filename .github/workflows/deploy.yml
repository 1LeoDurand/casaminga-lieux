name: Deploy → admin.casaminga.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build Infomaniak
    runs-on: ubuntu-latest

    steps:
      # Déclenche le Node.js Builder Infomaniak (git pull + npm build configurés dans le panel)
      - name: Trigger Infomaniak Node.js build
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.INFOMANIAK_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.infomaniak.com/1/hostings/112464/nodejs/56239/actions/build")
          echo "API response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"result":"success"' && echo "✅ Build déclenché !" || echo "⚠️ Réponse inattendue"
